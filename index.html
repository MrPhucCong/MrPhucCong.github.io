<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Phân Tích Baccarat Chuyên Nghiệp</title>
    <style>
        :root {
            --bg-main: #f0f2f5;
            --bg-card: #ffffff;
            --primary-text: #1d2129;
            --secondary-text: #606770;
            --border-color: #e0e0e0;
            --shadow-color: rgba(0, 0, 0, 0.05);
            --player-color: #007bff;
            --banker-color: #dc3545;
            --tie-color: #28a745;
            --accent-color: #ffc107;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--primary-text);
            padding: 20px;
        }
        .container {
            max-width: 1800px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }
        .control-panel {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 12px var(--shadow-color);
            height: fit-content;
        }
        .control-panel h2 {
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--secondary-text);
        }
        #gameHistory {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
            resize: vertical;
            min-height: 100px;
        }
        button {
            width: 100%;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            margin-top: 10px;
        }
        .btn-analyze { background-color: #1877f2; }
        .btn-analyze:hover { background-color: #166fe5; }
        .btn-sample { background-color: var(--secondary-text); }
        .btn-sample:hover { background-color: #555c66; }
        .btn-clear { background-color: var(--banker-color); }
        .btn-clear:hover { background-color: #c82333; }
        
        .dashboard {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .stat-card {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 12px var(--shadow-color);
        }
        .stat-card h3 {
            font-size: 1.1em;
            color: var(--secondary-text);
            margin-bottom: 15px;
        }
        .stat-value {
            font-size: 2.5em;
            font-weight: 700;
        }
        .stat-value.player { color: var(--player-color); }
        .stat-value.banker { color: var(--banker-color); }
        .stat-value.tie { color: var(--tie-color); }
        .stat-value.accuracy { color: var(--accent-color); }

        .progress-bar {
            width: 100%;
            background-color: #e9ecef;
            border-radius: 5px;
            height: 10px;
            margin-top: 8px;
        }
        .progress-bar div {
            height: 100%;
            border-radius: 5px;
            transition: width 0.5s ease-in-out;
        }
        .progress-p { background-color: var(--player-color); }
        .progress-b { background-color: var(--banker-color); }
        .progress-t { background-color: var(--tie-color); }
        #accuracySubtext { font-size: 0.9em; margin-top: 5px; color: var(--secondary-text); }

        .main-prediction-card {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 12px var(--shadow-color);
            text-align: center;
        }
        .prediction-value {
            font-size: 2em;
            font-weight: 700;
            padding: 10px 25px;
            border-radius: 8px;
            display: inline-block;
            margin: 10px 0;
            color: white;
        }
        .prediction-player { background-color: var(--player-color); }
        .prediction-banker { background-color: var(--banker-color); }
        .prediction-nobet { background-color: #6c757d; }

        #analysisText {
            margin-top: 15px;
            font-size: 1.1em;
            line-height: 1.6;
            color: #333;
        }

        .roads-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }
        .road-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 12px var(--shadow-color);
            overflow-x: auto;
        }
        .road-card h3 { text-align: center; margin-bottom: 15px; color: var(--primary-text); }
        .road-display {
            display: grid;
            grid-auto-flow: column;
            grid-auto-columns: 28px;
            gap: 2px;
            min-height: 168px; /* 6 rows * 28px */
            padding-bottom: 10px;
        }
        .road-bead {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            position: relative;
            font-size: 0.8em;
        }
        .bead-p { background-color: var(--player-color); }
        .bead-b { background-color: var(--banker-color); }
        .tie-slash {
            position: absolute;
            width: 100%;
            height: 3px;
            background: var(--tie-color);
            transform: rotate(45deg);
            border-radius: 3px;
        }
        .derived-red { border: 3px solid var(--banker-color); }
        .derived-blue { border: 3px solid var(--player-color); }

        #loadingOverlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            color: white;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="loadingOverlay">Đang phân tích...</div>
    <div class="container">
        <div class="control-panel">
            <h2>Bảng Điều Khiển</h2>
            <div class="form-group">
                <label for="gameHistory">Lịch Sử Ván Bài (P, B, T)</label>
                <textarea id="gameHistory" rows="10" placeholder="Nhập lịch sử các ván bài tại đây..."></textarea>
            </div>
            <button class="btn-analyze" onclick="runAnalysis()">📊 PHÂN TÍCH</button>
            <button class="btn-sample" onclick="generateSampleData()">🎲 Dữ Liệu Mẫu</button>
            <button class="btn-clear" onclick="clearAll()">🗑️ Xóa Tất Cả</button>
        </div>

        <div class="dashboard" id="dashboard" style="display:none;">
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Tỷ Lệ Thắng (Toàn bộ)</h3>
                    <div id="statsPlayer"></div>
                    <div id="statsBanker"></div>
                    <div id="statsTie"></div>
                </div>
                <div class="stat-card">
                    <h3>📈 Độ Chính Xác Gợi Ý</h3>
                    <div id="accuracyValue" class="stat-value accuracy">0%</div>
                    <div id="accuracySubtext"></div>
                </div>
            </div>
            
            <div class="main-prediction-card">
                <h2>Gợi Ý & Diễn Giải Chi Tiết</h2>
                <div id="predictionOutput"></div>
                <p id="analysisText"></p>
            </div>
            
            <div class="roads-grid">
                <div class="road-card"><h3>Bảng Lớn (Big Road)</h3><div id="bigRoad" class="road-display"></div></div>
                <div class="road-card"><h3>Bảng Mắt Lớn</h3><div id="bigEyeRoad" class="road-display"></div></div>
                <div class="road-card"><h3>Bảng Nhỏ</h3><div id="smallRoad" class="road-display"></div></div>
                <div class="road-card"><h3>Bảng Gián</h3><div id="cockroachRoad" class="road-display"></div></div>
            </div>
        </div>
    </div>

    <script>
        const MIN_HISTORY_FOR_ANALYSIS = 15;
        
        // --- Core Logic Functions ---
        
        function parseHistory(historyString) {
            return historyString.toUpperCase().replace(/[^PBT]/g, '').split('');
        }

        function parseBigRoad(history) {
            const bigRoadMatrix = [];
            if (!history || history.length === 0) return bigRoadMatrix;

            let currentCol = -1;
            let lastResult = '';
            
            history.forEach(res => {
                if (res === 'T') {
                    if (currentCol >= 0 && bigRoadMatrix[currentCol].length > 0) {
                        bigRoadMatrix[currentCol][bigRoadMatrix[currentCol].length - 1].tie++;
                    }
                } else {
                    if (res !== lastResult) {
                        currentCol++;
                        bigRoadMatrix.push([]);
                        lastResult = res;
                    }
                    bigRoadMatrix[currentCol].push({ val: res, tie: 0 });
                }
            });
            return bigRoadMatrix;
        }

        function generateDerivedRoad(bigRoadMatrix, colOffset) {
            const derivedRoad = [];
            if (!bigRoadMatrix || bigRoadMatrix.length <= colOffset) return derivedRoad;

            let derivedCol = -1;
            let lastDerivedResult = null;
            
            for (let c = colOffset; c < bigRoadMatrix.length; c++) {
                for (let r = 0; r < bigRoadMatrix[c].length; r++) {
                    let isRed = false; // Red = Orderly, Blue = Choppy
                    
                    const refCol = c - colOffset;
                    const entryAtSameRowInRefCol = bigRoadMatrix[refCol][r];
                    const entryAtPrevRowInRefCol = bigRoadMatrix[refCol][r - 1];

                    if (entryAtSameRowInRefCol) {
                        isRed = true;
                    } else {
                        isRed = (entryAtPrevRowInRefCol && bigRoadMatrix[c].length === bigRoadMatrix[refCol].length);
                    }
                    
                    const newDerivedResult = { val: isRed ? 'Red' : 'Blue' };

                    if (derivedCol === -1 || newDerivedResult.val !== lastDerivedResult) {
                        derivedCol++;
                        derivedRoad.push([]);
                        lastDerivedResult = newDerivedResult.val;
                    }
                    derivedRoad[derivedCol].push(newDerivedResult);
                }
            }
            return derivedRoad;
        }

        function getPredictionFromRoads(bigRoadMatrix, derivedRoads) {
            const lastResult = bigRoadMatrix.flat().slice(-1)[0]?.val;
            if (!lastResult) return { prediction: 'NO_BET', analysis: 'Không đủ dữ liệu để đưa ra gợi ý.' };

            const trends = [
                getRoadTrend(derivedRoads.bigEye),
                getRoadTrend(derivedRoads.small),
                getRoadTrend(derivedRoads.cockroach)
            ].filter(t => t !== 'Neutral');

            if (trends.length < 2) {
                return { prediction: 'NO_BET', analysis: 'Các bảng cầu phụ chưa hình thành quy luật rõ ràng. Nên quan sát thêm.' };
            }
            
            const redTrends = trends.filter(t => t === 'Red').length;
            const blueTrends = trends.filter(t => t === 'Blue').length;

            if (redTrends / trends.length >= 0.67) {
                return {
                    prediction: lastResult,
                    analysis: `<strong>Xu hướng TRẬT TỰ chiếm ưu thế.</strong> Phần lớn (${redTrends}/${trends.length}) bảng cầu phụ báo hiệu cầu đang đi theo quy luật ổn định. Gợi ý ưu tiên theo cầu hiện tại.`
                };
            } else if (blueTrends / trends.length >= 0.67) {
                return {
                    prediction: lastResult === 'P' ? 'B' : 'P',
                    analysis: `<strong>Xu hướng HỖN LOẠN chiếm ưu thế.</strong> Phần lớn (${blueTrends}/${trends.length}) bảng cầu phụ báo hiệu cầu đang trong giai đoạn biến động, dễ gãy. Gợi ý ưu tiên đánh ngược lại cầu hiện tại.`
                };
            } else {
                return {
                    prediction: 'NO_BET',
                    analysis: `<strong>Tín hiệu BẤT ĐỒNG.</strong> Các bảng cầu phụ đang cho ra các tín hiệu trái ngược nhau (Trật Tự: ${redTrends}, Hỗn Loạn: ${blueTrends}). Cầu khó đoán, rủi ro cao. Khuyến nghị BỎ QUA ván này.`
                };
            }
        }

        function getRoadTrend(derivedRoad, lookback = 6) {
            if (!derivedRoad || derivedRoad.length === 0) return 'Neutral';
            const flatRoad = derivedRoad.flat().slice(-lookback);
            if(flatRoad.length < 3) return 'Neutral';
            const redCount = flatRoad.filter(b => b.val === 'Red').length;
            const blueCount = flatRoad.filter(b => b.val === 'Blue').length;
            if (redCount / flatRoad.length > 0.6) return 'Red';
            if (blueCount / flatRoad.length > 0.6) return 'Blue';
            return 'Neutral';
        }

        function runBacktest(fullHistory) {
            let correct = 0;
            let totalPredictions = 0;

            for (let i = MIN_HISTORY_FOR_ANALYSIS; i < fullHistory.length; i++) {
                const pastHistory = fullHistory.slice(0, i);
                const actualOutcome = fullHistory[i];

                if (actualOutcome === 'T') continue; // Don't grade Ties

                const bigRoadMatrix = parseBigRoad(pastHistory);
                const derivedRoads = {
                    bigEye: generateDerivedRoad(bigRoadMatrix, 1),
                    small: generateDerivedRoad(bigRoadMatrix, 2),
                    cockroach: generateDerivedRoad(bigRoadMatrix, 3)
                };
                const { prediction } = getPredictionFromRoads(bigRoadMatrix, derivedRoads);
                
                if (prediction !== 'NO_BET') {
                    totalPredictions++;
                    if (prediction === actualOutcome) {
                        correct++;
                    }
                }
            }
            return { correct, total: totalPredictions };
        }

        // --- UI Rendering Functions ---
        
        function renderRoad(elementId, roadMatrix, roadType) {
            const container = document.getElementById(elementId);
            container.innerHTML = '';
            if (!roadMatrix) return;
            roadMatrix.forEach(col => {
                const colDiv = document.createElement('div');
                col.forEach(bead => {
                    if (!bead) return;
                    const beadDiv = document.createElement('div');
                    if (roadType === 'big') {
                        beadDiv.className = `road-bead bead-${bead.val.toLowerCase()}`;
                        if (bead.tie > 0) {
                            const slash = document.createElement('div');
                            slash.className = 'tie-slash';
                            beadDiv.appendChild(slash);
                        }
                    } else {
                        beadDiv.className = `road-bead derived-${bead.val.toLowerCase()}`;
                    }
                    colDiv.appendChild(beadDiv);
                });
                container.appendChild(colDiv);
            });
        }
        
        function updateStatisticsUI(history) {
            const pCount = history.filter(h => h === 'P').length;
            const bCount = history.filter(h => h === 'B').length;
            const tCount = history.filter(h => h === 'T').length;
            const total = history.length;

            const pPercent = total > 0 ? (pCount / total * 100).toFixed(1) : 0;
            const bPercent = total > 0 ? (bCount / total * 100).toFixed(1) : 0;
            const tPercent = total > 0 ? (tCount / total * 100).toFixed(1) : 0;

            document.getElementById('statsPlayer').innerHTML = `
                <div style="font-weight: 600;">Player: ${pCount} (${pPercent}%)</div>
                <div class="progress-bar"><div class="progress-p" style="width: ${pPercent}%;"></div></div>`;
            document.getElementById('statsBanker').innerHTML = `
                <div style="font-weight: 600;">Banker: ${bCount} (${bPercent}%)</div>
                <div class="progress-bar"><div class="progress-b" style="width: ${bPercent}%;"></div></div>`;
            document.getElementById('statsTie').innerHTML = `
                <div style="font-weight: 600;">Tie: ${tCount} (${tPercent}%)</div>
                <div class="progress-bar"><div class="progress-t" style="width: ${tPercent}%;"></div></div>`;
        }

        function updatePredictionUI({ prediction, analysis }) {
            const outputEl = document.getElementById('predictionOutput');
            let html = '';
            if (prediction === 'P') {
                html = `<div class="prediction-value prediction-player">PLAYER (CON)</div>`;
            } else if (prediction === 'B') {
                html = `<div class="prediction-value prediction-banker">BANKER (CÁI)</div>`;
            } else {
                html = `<div class="prediction-value prediction-nobet">⚠️ BỎ QUA</div>`;
            }
            outputEl.innerHTML = html;
            document.getElementById('analysisText').innerHTML = analysis;
        }

        function updateAccuracyUI({ correct, total }) {
            const accuracy = total > 0 ? (correct / total * 100).toFixed(1) : 0;
            document.getElementById('accuracyValue').innerText = `${accuracy}%`;
            document.getElementById('accuracySubtext').innerText = `Đúng ${correct} / ${total} gợi ý`;
        }
        
        // --- Main Controller ---

        function runAnalysis() {
            const historyString = document.getElementById('gameHistory').value;
            const history = parseHistory(historyString);
            
            if (history.length < MIN_HISTORY_FOR_ANALYSIS) {
                alert(`Vui lòng nhập ít nhất ${MIN_HISTORY_FOR_ANALYSIS} ván để có kết quả phân tích đáng tin cậy.`);
